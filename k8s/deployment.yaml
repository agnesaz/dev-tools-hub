apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-tools-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-tools-app
  template:
    metadata:
      labels:
        app: dev-tools-app
    spec:
      containers:
        - name: app
          image: your-dockerhub-username/dev-tools-hub:latest
          ports:
            - containerPort: 3001
          env:
            - name: MONGODB_URI
              value: mongodb://mongo:27017/dev-tools-hub