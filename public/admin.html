<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Dev Tools Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    /* Login Page */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-box {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
      padding: 50px 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(59, 130, 246, 0.1);
      backdrop-filter: blur(10px);
    }

    .login-box h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 28px;
      color: #fff;
    }

    .login-subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: #1e293b;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      background: #7f1d1d;
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #dc2626;
      display: none;
      font-size: 14px;
    }

    /* Dashboard */
    .dashboard {
      display: none;
      min-height: 100vh;
    }

    .dashboard-wrapper {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      border-right: 1px solid #334155;
      padding: 30px 20px;
      overflow-y: auto;
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 30px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-item {
      display: block;
      width: 100%;
      padding: 12px 16px;
      color: #cbd5e1;
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      font-size: 14px;
      transition: all 0.3s;
      text-align: left;
    }

    .nav-item:hover {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .logout-btn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: auto;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
    }

    /* Main Content */
    .main-content {
      margin-left: 280px;
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .header {
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      color: #94a3b8;
      font-size: 14px;
    }

    .add-btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 30px;
      transition: all 0.3s;
      font-size: 14px;
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
    }

    /* Links Grid */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .link-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
      padding: 24px;
      border-radius: 12px;
      transition: all 0.3s;
      /* hover: transform 0.3s; */
    }

    .link-card:hover {
      border-color: #3b82f6;
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
      transform: translateY(-4px);
    }

    .link-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .link-icon {
      font-size: 28px;
    }

    .link-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .link-category {
      display: inline-block;
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .link-url {
      color: #64748b;
      font-size: 13px;
      word-break: break-all;
      margin-bottom: 12px;
      display: block;
      text-decoration: none;
    }

    .link-url:hover {
      color: #3b82f6;
    }

    .link-description {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .link-actions {
      display: flex;
      gap: 8px;
    }

    .btn-small {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-edit {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .btn-edit:hover {
      background: rgba(59, 130, 246, 0.3);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid #334155;
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-content h2 {
      font-size: 24px;
      margin-bottom: 24px;
      color: #fff;
    }

    .modal-content .form-group {
      margin-bottom: 18px;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    .modal-content input:focus,
    .modal-content textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: #1e293b;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-save {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: #cbd5e1;
      border: 1px solid #334155;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #475569;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid #334155;
        padding: 20px;
      }

      .main-content {
        margin-left: 0;
        padding: 20px;
      }

      .links-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Login Section -->
  <div id="loginSection" class="login-container">
    <div class="login-box">
      <h1>🛠️ Dev Tools Hub</h1>
      <p class="login-subtitle">Admin Dashboard</p>
      <div id="loginError" class="login-error"></div>
      
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="admin123">
      </div>
      <button class="login-btn" onclick="login()">Sign In</button>
    </div>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard" class="dashboard">
    <div class="dashboard-wrapper">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="logo">
          <span>🛠️</span>
          <span>Admin</span>
        </div>
        <button class="nav-item">Dashboard</button>
        <button class="nav-item">Links</button>
        <button class="nav-item">Settings</button>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <div class="header">
          <h1>Manage Links</h1>
          <p>Create, edit, and organize your developer tools</p>
        </div>

        <button class="add-btn" onclick="openModal()">+ Add New Link</button>

        <div id="linksList" class="links-grid"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="linkModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Link</h2>
      <form id="linkForm" onsubmit="saveLink(event)">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="linkTitle" required>
        </div>
        <div class="form-group">
          <label>URL *</label>
          <input type="url" id="linkUrl" required>
        </div>
        <div class="form-group">
          <label>Icon (emoji) *</label>
          <input type="text" id="linkIcon" placeholder="🐙" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="linkDescription" placeholder="Brief description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <input type="text" id="linkCategory" placeholder="e.g., Development" required>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn-save">Save Link</button>
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    let token = localStorage.getItem('token');
    let currentLinkId = null;

    if (token) {
      showDashboard();
      loadLinks();
    }

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = data.message || 'Login failed';
          errorDiv.style.display = 'block';
          return;
        }

        token = data.data.token;
        localStorage.setItem('token', token);
        showDashboard();
        loadLinks();
      } catch (error) {
        errorDiv.textContent = 'Error: ' + error.message;
        errorDiv.style.display = 'block';
      }
    }

    async function loadLinks() {
      try {
        const response = await fetch(`${API_URL}/links`);
        const data = await response.json();
        const links = Array.isArray(data) ? data : (data.data || []);

        const linksList = document.getElementById('linksList');
        
        if (links.length === 0) {
          linksList.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              <p>No links yet. Create your first one!</p>
            </div>
          `;
          return;
        }

        linksList.innerHTML = links.map(link => `
          <div class="link-card">
            <div class="link-header">
              <span class="link-icon">${link.icon || '🔗'}</span>
              <div class="link-title">${link.title}</div>
            </div>
            ${link.category ? `<span class="link-category">${link.category}</span>` : ''}
            <a href="${link.url}" target="_blank" class="link-url">${link.url}</a>
            ${link.description ? `<p class="link-description">${link.description}</p>` : ''}
            <div class="link-actions">
              <button class="btn-small btn-edit" onclick="editLink('${link._id}')">Edit</button>
              <button class="btn-small btn-delete" onclick="deleteLink('${link._id}')">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function editLink(id) {
      try {
        const response = await fetch(`${API_URL}/links/${id}`);
        const data = await response.json();
        const link = Array.isArray(data) ? data[0] : (data.data || data);

        currentLinkId = id;
        document.getElementById('modalTitle').textContent = 'Edit Link';
        document.getElementById('linkTitle').value = link.title;
        document.getElementById('linkUrl').value = link.url;
        document.getElementById('linkIcon').value = link.icon || '';
        document.getElementById('linkDescription').value = link.description || '';
        document.getElementById('linkCategory').value = link.category || '';
        openModal();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function deleteLink(id) {
      if (!confirm('Delete this link?')) return;

      try {
        await fetch(`${API_URL}/links/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        loadLinks();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    async function saveLink(event) {
      event.preventDefault();

      const linkData = {
        title: document.getElementById('linkTitle').value,
        url: document.getElementById('linkUrl').value,
        icon: document.getElementById('linkIcon').value,
        description: document.getElementById('linkDescription').value,
        category: document.getElementById('linkCategory').value
      };

      try {
        const method = currentLinkId ? 'PUT' : 'POST';
        const url = currentLinkId ? `${API_URL}/links/${currentLinkId}` : `${API_URL}/links`;

        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(linkData)
        });

        if (!response.ok) throw new Error('Error saving');

        closeModal();
        loadLinks();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function openModal() {
      currentLinkId = null;
      document.getElementById('modalTitle').textContent = 'Add Link';
      document.getElementById('linkForm').reset();
      document.getElementById('linkModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('linkModal').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    }

    function logout() {
      localStorage.removeItem('token');
      token = null;
      document.getElementById('loginSection').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }
  </script>
</body>
</html>
