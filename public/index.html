<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Tools Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        h1 {
            color: white;
            font-size: 2.5em;
        }
        .admin-btn {
            background: white;
            color: #667eea;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .admin-btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .link-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        .link-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .link-card h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #333;
        }
        .link-card p {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .link-card .category {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }
        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Developer Tools Hub</h1>
            <a href="/admin.html" class="admin-btn">🔐 Login as Admin</a>
        </div>
        <div id="links-container" class="links-grid">
            <div class="loading">Loading links...</div>
        </div>
    </div>

    <script>
        async function loadLinks() {
            try {
                const response = await fetch('/api/links');
                if (!response.ok) throw new Error('Failed to fetch links');
                
                const data = await response.json();
                
                const links = Array.isArray(data) ? data : (data.data || []);
                
                const container = document.getElementById('links-container');
                
                if (links.length === 0) {
                    container.innerHTML = '<div class="error">No links available yet</div>';
                    return;
                }
                
                container.innerHTML = links.map(link => `
                    <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="link-card">
                        <div class="link-icon">${link.icon || '🔗'}</div>
                        <h2>${link.title}</h2>
                        <p>${link.description || 'Click to visit'}</p>
                        ${link.category ? `<span class="category">${link.category}</span>` : ''}
                    </a>
                `).join('');
            } catch (error) {
                document.getElementById('links-container').innerHTML = 
                    `<div class="error">Error loading links: ${error.message}</div>`;
            }
        }

        loadLinks();
        setInterval(loadLinks, 30000);
    </script>
</body>
</html>
