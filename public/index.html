<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Tools Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            color: #94a3b8;
            font-size: 0.95em;
            margin-top: -30px;
        }

        .admin-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1em;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .admin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
        }

        .admin-btn:active {
            transform: translateY(-1px);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .link-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 28px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
            transition: left 0.5s;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.2);
        }

        .link-icon {
            font-size: 3.5em;
            margin-bottom: 16px;
            display: block;
            position: relative;
            z-index: 1;
        }

        .link-card h2 {
            font-size: 1.35em;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .link-card p {
            color: #cbd5e1;
            font-size: 0.95em;
            margin-bottom: 18px;
            flex-grow: 1;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .link-card .category {
            display: inline-block;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(16, 185, 129, 0.2));
            color: #3b82f6;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
            border: 1px solid rgba(59, 130, 246, 0.3);
            margin-top: 12px;
            position: relative;
            z-index: 1;
        }

        .link-card:hover .category {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(16, 185, 129, 0.3));
            border-color: rgba(59, 130, 246, 0.5);
        }

        .loading {
            text-align: center;
            color: #cbd5e1;
            font-size: 1.1em;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1em;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }

        .empty-state h2 {
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            h1 {
                font-size: 2em;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }

            .link-card {
                padding: 20px;
            }

            .link-icon {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <p class="header-subtitle">Your curated collection of development tools</p>
                <h1>🛠️ Developer Tools Hub</h1>
            </div>
            <a href="/admin.html" class="admin-btn">🔐 Admin Panel</a>
        </div>
        <div id="links-container" class="links-grid">
            <div class="loading">Loading tools...</div>
        </div>
    </div>

    <script>
        async function loadLinks() {
            try {
                const response = await fetch('/api/links');
                if (!response.ok) throw new Error('Failed to fetch links');
                
                const data = await response.json();
                const links = Array.isArray(data) ? data : (data.data || []);
                
                const container = document.getElementById('links-container');
                
                if (links.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>No tools available yet</h2>
                            <p>Check back soon or add some tools from the admin panel</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = links.map(link => `
                    <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="link-card">
                        <div class="link-icon">${link.icon || '🔗'}</div>
                        <h2>${link.title}</h2>
                        <p>${link.description || 'Visit this tool'}</p>
                        ${link.category ? `<span class="category">${link.category}</span>` : ''}
                    </a>
                `).join('');
            } catch (error) {
                document.getElementById('links-container').innerHTML = 
                    `<div class="error">⚠️ Error loading tools: ${error.message}</div>`;
            }
        }

        // Load on page load
        loadLinks();
        
        // Refresh every 30 seconds
        setInterval(loadLinks, 30000);
    </script>
</body>
</html>
